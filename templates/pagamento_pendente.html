<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento pendente - MeuLove</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <style>
        :root {
            --cor-principal: #ff6a88;
            --cor-secundaria: #ff99ac;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4A102A, #2D145F);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            text-align: center;
            max-width: 440px;
            width: 100%;
            padding: 48px 36px;
            border-radius: 28px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
            backdrop-filter: blur(20px);
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .emoji {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        p {
            color: #f0b8cb;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .btn {
            display: block;
            padding: 14px 28px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--cor-principal), var(--cor-secundaria));
            color: white;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(255,106,136,0.4);
            transition: 0.25s;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn-voltar {
            display: block;
            padding: 13px 28px;
            border-radius: 50px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            color: #f0b8cb;
            font-size: 15px;
            text-decoration: none;
            transition: 0.25s;
        }

        .btn-voltar:hover {
            background: rgba(255,255,255,0.14);
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="emoji">⏳</span>
        <h1>Pagamento pendente</h1>
        <p>
            Seu pagamento via PIX está sendo processado.<br>
            Assim que confirmado, você já poderá criar sua surpresa! 💖
        </p>
        <a href="/create" class="btn">Tentar acessar agora</a>
        <a href="/" class="btn-voltar">Voltar ao início</a>
    </div>
</body>
</html>
