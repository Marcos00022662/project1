<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova senha - MeuLove</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>

<section class="criar">
    <form class="form-container" action="" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2>Nova senha</h2>

        {% if invalid %}
        <p class="erro-senha">{{ error }}</p>
        <p class="register-link">
            <a href="/forgot-password">Solicitar outro link</a>
        </p>
        {% else %}
        <p>Crie uma nova senha para acessar sua conta.</p>

        <input type="password" name="password" placeholder="Nova senha" required>
        <input type="password" name="password_confirm" placeholder="Confirmar nova senha" required>

        <button type="submit">Salvar nova senha</button>

        {% if error %}
        <p class="erro-senha">{{ error }}</p>
        {% endif %}
        {% endif %}
    </form>
</section>

</body>
</html>
